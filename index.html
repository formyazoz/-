<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>معايدة العيد</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #fceabb 0%, #f8b500 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #f8b500;
            object-fit: cover;
        }
        h1 { color: #d35400; }
        p { font-size: 1.2rem; color: #333; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background: #d35400;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }
        .btn:hover { background: #e67e22; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://via.placeholder.com/150" alt="صورتي">
    <h1>عيدك مبارك! ✨</h1>
    <p>كل عام وأنت بخير وصحة وسلامة، تقبل الله طاعاتكم وأسعد أيامكم.</p>
    <a href="#" class="btn">افتح العيدية 🎁</a>
</div>

</body>
</html>
